<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Score บาป - Realtime Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --accent: #58a6ff; --danger: #f85149; --success: #3fb950; --border: #30363d; }
        body { font-family: 'Consolas', monospace; background: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 700px; }
        .header { text-align: center; border: 1px solid var(--border); padding: 20px; margin-bottom: 20px; border-radius: 8px; background: var(--card); }
        #totalScore { font-size: 3em; color: var(--danger); font-weight: bold; }
        .panel { background: var(--card); padding: 15px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 20px; }
        input, button { background: #0d1117; border: 1px solid var(--border); color: white; padding: 8px; border-radius: 4px; margin: 5px 2px; font-family: inherit; }
        button { cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #21262d; }
        .user-card { background: var(--card); border: 1px solid var(--border); padding: 15px; margin-bottom: 10px; border-radius: 6px; display: grid; grid-template-columns: 1fr auto; gap: 15px; }
        .voter-input { width: 90px; border-color: var(--accent); font-size: 0.8em; }
        .history { font-size: 0.7em; color: #8b949e; margin-top: 10px; border-top: 1px solid var(--border); padding-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 style="color:var(--accent); margin:0;">[บัญชีคนบาป]</h1>
            <div>TOTAL SYSTEM GUILT: <span id="totalScore">0</span></div>
        </div>

        <div class="panel">
            <h3 style="margin:0 0 10px 0; font-size: 0.9em; color: var(--accent);">// REGISTER_NEW_ENTITY</h3>
            <div style="display: flex; gap: 5px;">
                <input type="text" id="regName" placeholder="NAME" style="flex: 1;">
                <input type="text" id="regNote" placeholder="REMARK" style="flex: 2;">
            </div>
            <button onclick="addUser()" style="width:100%; background:var(--accent); color:#000; border:none;">PUSH TO CLOUD</button>
        </div>

        <div id="board"></div>
    </div>

    <script>
        // 1. Firebase Configuration
        const firebaseConfig = {
           databaseURL: "https://scorebad-4a88f-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. Real-time Listener: อัปเดต UI ทันทีเมื่อข้อมูลใน Cloud เปลี่ยนแปลง
        db.ref('scores').on('value', (snapshot) => {
            const data = snapshot.val() || {};
            const board = document.getElementById('board');
            let total = 0;
            board.innerHTML = '';

            Object.keys(data).forEach(id => {
                const user = data[id];
                total += user.score;
                
                // จัดการดึง Log ล่าสุดมาแสดงผล
                const logsArr = user.logs ? Object.values(user.logs) : [];
                const latestLogs = logsArr.reverse().slice(0, 3).map(l => 
                    `[${l.time}] ${l.voter}: ${l.change > 0 ? '+' : ''}${l.change}`
                ).join(' | ');

                board.innerHTML += `
                    <div class="user-card">
                        <div>
                            <div style="font-size: 1.2em; font-weight: bold; color: var(--accent);">${user.name}</div>
                            <div style="font-size: 0.8em; color: #8b949e;">${user.note}</div>
                            <div class="history">LOGS: ${latestLogs || 'READY'}</div>
                        </div>
                        <div style="text-align: right; display: flex; flex-direction: column; justify-content: center; align-items: flex-end;">
                            <div style="font-size: 2.2em;">${user.score}</div>
                            <div>
                                <input type="text" id="v-${id}" class="voter-input" placeholder="ชื่อผู้โหวตคะแนน">
                                <button onclick="updateScore('${id}', ${user.score}, 1)" style="color:var(--success)">+</button>
                                <button onclick="updateScore('${id}', ${user.score}, -1)" style="color:var(--danger)">-</button>
                            </div>
                        </div>
                    </div>`;
            });
            document.getElementById('totalScore').innerText = total;
        });

        // 3. ฟังก์ชันเพิ่มรายชื่อใหม่
        function addUser() {
            const name = document.getElementById('regName').value.trim();
            const note = document.getElementById('regNote').value.trim();
            if (!name) return;
            db.ref('scores').push({ 
                name: name, 
                note: note || 'N/A', 
                score: 0 
            });
            document.getElementById('regName').value = '';
            document.getElementById('regNote').value = '';
        }

        // 4. ฟังก์ชันอัปเดตคะแนนและบันทึก Log
        function updateScore(id, currentScore, change) {
            const voter = document.getElementById(`v-${id}`).value.trim();
            if (!voter) return alert('ใส่ชื่อผู้โหวต!');
            
            const time = new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
            
            // อัปเดตคะแนนหลัก
            db.ref(`scores/${id}`).update({ score: currentScore + change });
            
            // เพิ่ม Log ประวัติ
            db.ref(`scores/${id}/logs`).push({ 
                voter: voter, 
                change: change, 
                time: time 
            });
        }
    </script>
</body>
</html>
